<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gestor de Tareas</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f4f4f4;
      color: #222;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    form {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    li {
      padding: 8px 0;
      border-bottom: 1px solid #ddd;
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>
  <h1>Gestor de Tareas</h1>

  <div class="card">
    <form id="task-form">
      <input id="task-title" type="text" placeholder="Nueva tarea..." required />
      <button type="submit">Agregar</button>
    </form>

    <ul id="task-list"></ul>

    <div class="status" id="status"></div>
  </div>

  <script>
    const API_BASE_URL = "/api";

    const taskList = document.getElementById("task-list");
    const taskForm = document.getElementById("task-form");
    const taskTitle = document.getElementById("task-title");
    const statusBox = document.getElementById("status");

    async function loadTasks() {
      try {
        statusBox.textContent = "Cargando tareas...";

        const response = await fetch(`${API_BASE_URL}/tasks`);
        const tasks = await response.json();

        taskList.innerHTML = "";

        tasks.forEach(task => {
          const li = document.createElement("li");
          li.textContent = `${task.id}. ${task.title} ${task.completed ? "✅" : ""}`;
          taskList.appendChild(li);
        });

        statusBox.textContent = "Conectado al backend.";
      } catch (error) {
        statusBox.textContent = "Error conectando con la API.";
        console.error(error);
      }
    }

    taskForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const title = taskTitle.value.trim();

      if (!title) {
        return;
      }

      await fetch(`${API_BASE_URL}/tasks`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ title })
      });

      taskTitle.value = "";
      loadTasks();
    });

    loadTasks();
  </script>
</body>
</html>
